# Stack de deploy del MVP: Postgres + API NestJS + Caddy (reverse-proxy HTTPS).
# Uso en el host (EC2): `docker compose up -d --build`
#
# Variables (archivo .env junto a este compose, NO versionado):
#   DOMAIN=<elastic-ip-con-guiones>.nip.io   # p. ej. 13-52-1-7.nip.io
# Opcionales (tienen default; Postgres NO se expone al host, sólo a la red de compose):
#   POSTGRES_PASSWORD=...   MVP_USER_ID=...
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ready
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ready}
      POSTGRES_DB: ready
    # Sin `ports`: la DB sólo es alcanzable dentro de la red de compose (la API la ve;
    # internet no). Por eso el password por default es aceptable en el MVP.
    volumes:
      - ready_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ready -d ready"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://ready:${POSTGRES_PASSWORD:-ready}@postgres:5432/ready?schema=public
      MVP_USER_ID: ${MVP_USER_ID:-00000000-0000-0000-0000-000000000001}
      # Imágenes en AWS S3 real (bucket privado ready-uploads). endpoint vacío y
      # force_path_style false = AWS por defecto. Las llaves (user scopeado solo-S3
      # ready-app-s3) las inyecta el deploy en el .env del host (no versionado).
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-ready-uploads}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      IMAGE_PUBLIC_BASE_URL: ${IMAGE_PUBLIC_BASE_URL:-https://${DOMAIN}}
    depends_on:
      postgres:
        condition: service_healthy
    # `expose` publica el puerto SOLO dentro de la red de compose, no al host.
    # La API no es alcanzable directo desde internet: solo Caddy la ve.
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # Únicos puertos abiertos al mundo. El Security Group del EC2 abre 80/443.
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Caddy lee {$DOMAIN} del Caddyfile; lo emite Let's Encrypt automáticamente.
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Persisten certificados TLS entre reinicios (evita re-emitir y topar rate limits).
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
  ready_pgdata:
